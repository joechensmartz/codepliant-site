name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx -p typescript tsc

      - name: Lint
        run: npx tsc --noEmit --strict

      - name: Test
        run: npx tsx --test 'src/**/*.test.ts'

  compliance:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx -p typescript tsc

      - name: Run Codepliant on itself
        uses: ./
        with:
          path: "."
          output-dir: "legal"
          fail-on-missing: "false"
          comment-on-pr: "true"
